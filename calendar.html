<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>캘린더 | 서울대 언론비평동아리 필화</title>
    <meta
      name="description"
      content="서울대 언론비평동아리 필화 활동 캘린더 페이지입니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="site-header.js"></script>
    <script type="module" src="calendar-page.js"></script>
  </head>
  <body>
    <div class="site-shell">
      <site-header current="calendar"></site-header>

      <main>
        <section class="section-block">
          <div class="calendar-shell">
            <div class="calendar-toolbar">
              <div class="calendar-toolbar-group">
                <button class="calendar-nav-button" id="calendar-prev-year" type="button">&lt;&lt;</button>
                <button class="calendar-nav-button" id="calendar-prev-month" type="button">&lt;</button>
              </div>
              <p class="calendar-current-label" id="calendar-current-label">일정을 불러오는 중입니다.</p>
              <div class="calendar-toolbar-group">
                <button class="calendar-nav-button" id="calendar-next-month" type="button">&gt;</button>
                <button class="calendar-nav-button" id="calendar-next-year" type="button">&gt;&gt;</button>
              </div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>일</span>
              <span>월</span>
              <span>화</span>
              <span>수</span>
              <span>목</span>
              <span>금</span>
              <span>토</span>
            </div>
            <div class="calendar-grid" id="calendar-grid" aria-label="월간 일정 캘린더">
              <p class="content-placeholder">일정을 불러오는 중입니다.</p>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p>서울대 언론비평동아리 필화</p>
        <a href="mailto:pilhwa2016@gmail.com">pilhwa2016@gmail.com</a>
      </footer>
    </div>
    <div class="calendar-modal" id="calendar-modal" aria-hidden="true">
      <button class="calendar-modal-backdrop" id="calendar-modal-backdrop" type="button"></button>
      <div class="calendar-modal-dialog" role="dialog" aria-modal="true" aria-label="일정 상세">
        <button class="calendar-modal-close" id="calendar-modal-close" type="button" aria-label="팝업 닫기">
          닫기
        </button>
        <section class="calendar-detail" id="calendar-detail" aria-live="polite">
          <p class="content-placeholder">날짜를 선택하면 일정 상세가 표시됩니다.</p>
        </section>
      </div>
    </div>
  </body>
</html>
