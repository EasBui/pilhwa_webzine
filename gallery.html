<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>갤러리 | 서울대 언론비평동아리 필화</title>
    <meta
      name="description"
      content="서울대 언론비평동아리 필화 활동 갤러리 페이지입니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="site-header.js"></script>
    <script type="module" src="gallery-page.js"></script>
  </head>
  <body>
    <div class="site-shell">
      <site-header current="gallery"></site-header>

      <main>
        <section class="section-block">
          <div class="gallery-archive" id="gallery-archive" aria-live="polite">
            <p class="content-placeholder">갤러리를 불러오는 중입니다.</p>
          </div>
          <p class="gallery-feed-status" id="gallery-feed-status"></p>
          <div class="gallery-sentinel" id="gallery-sentinel" aria-hidden="true"></div>
        </section>
      </main>

      <footer class="site-footer">
        <p>서울대 언론비평동아리 필화</p>
        <a href="mailto:pilhwa2016@gmail.com">pilhwa2016@gmail.com</a>
      </footer>
    </div>
    <div class="gallery-lightbox" id="gallery-lightbox" aria-hidden="true">
      <button class="gallery-lightbox-backdrop" id="gallery-lightbox-backdrop" type="button"></button>
      <div class="gallery-lightbox-dialog" role="dialog" aria-modal="true" aria-label="확대 이미지 보기">
        <button class="gallery-lightbox-close" id="gallery-lightbox-close" type="button" aria-label="팝업 닫기">
          닫기
        </button>
        <img class="gallery-lightbox-image" id="gallery-lightbox-image" alt="" />
        <p class="gallery-lightbox-caption" id="gallery-lightbox-caption"></p>
      </div>
    </div>
  </body>
</html>
