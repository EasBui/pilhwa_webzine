<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>서울대 언론비평동아리 필화</title>
        <meta
            name="description"
            content="서울대 언론비평동아리 필화 홈페이지. 소개, 컨텐츠, 활동, 자료 메뉴로 이동할 수 있습니다."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <script type="module" src="site-header.js"></script>
    </head>
    <body class="landing-page">
        <div class="site-shell">
            <site-header current="home"></site-header>

            <main class="landing-main">
                <section class="landing-featured-section">
                    <div class="landing-section-head">
                        <p class="landing-kicker">Latest</p>
                        <h1>최근 웹진</h1>
                        <p class="landing-section-copy">
                            필화의 최신 글을 한눈에 볼 수 있도록 다시 정리했습니다.
                        </p>
                    </div>
                    <div class="landing-featured-controls">
                        <span class="landing-featured-pagination" id="featured-story-pagination"
                            >0 / 0</span
                        >
                        <div class="landing-featured-nav">
                            <button
                                class="carousel-button landing-featured-nav-button"
                                id="featured-story-prev"
                                type="button"
                                aria-label="이전 웹진 카드"
                            >
                                ←
                            </button>
                            <button
                                class="carousel-button landing-featured-nav-button"
                                id="featured-story-next"
                                type="button"
                                aria-label="다음 웹진 카드"
                            >
                                →
                            </button>
                        </div>
                    </div>
                    <div class="landing-featured-carousel">
                        <div class="landing-featured-track" id="featured-story" aria-live="polite">
                            <article class="landing-featured-card is-loading">
                                <p>콘텐츠를 불러오는 중입니다.</p>
                            </article>
                        </div>
                    </div>
                </section>

                <section class="landing-gallery-section">
                    <div class="landing-gallery-strip" id="landing-gallery-strip">
                        <p class="content-placeholder">사진을 불러오는 중입니다.</p>
                    </div>
                </section>
            </main>

            <footer class="site-footer">
                <p>서울대 언론비평동아리 필화</p>
                <a href="mailto:pilhwa2016@gmail.com">pilhwa2016@gmail.com</a>
            </footer>
        </div>
        <script type="module" src="landing-page.js"></script>
    </body>
</html>
